<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Las Recetas de Gusteau</title>
    <link rel="stylesheet" href="css/bulma.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <section class="hero is-medium header-section">
        <div id="hero-principal" class="hero-body">
            <div id="contenido-hero" class="container has-text-centered">
                <img src="img/gusteau.png" class="header-image" alt="Gusteau">
                <h1 id="titulo-principal" class="title is-1">Cualquiera puede cocinar</h1>
                <div id="botones-hero" class="tabs is-centered">
                    <ul>
                        <li><a class="button" id="boton-chefs">Chefs</a></li>
                        <li><a class="button" id="boton-recetas">Recetas</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </section>
    <section class="section" id="recetas-destacadas">
        <div class="container">
            <h2 class="title is-4 titulo-elementos">Recetas populares</h2>
            <div class="columns is-multiline">
                <div id="recetas-cl-1" class="column is-4-desktop">
                </div>
                <!-- ESTO SE BORRA. ES PARA TESTEAR TARJETAS. -->
                <div id="recetas-cl-2" class="column is-4-desktop">
                </div>
                <div id="recetas-cl-3" class="column is-4-desktop">
                </div>
                <!-- ESTO SE BORRA. ES PARA TESTEAR TARJETAS. -->
            </div>
            <hr class="my-5" id="division-recetas-chefs">
        </div>
    </section>
    <section class="section">
        <div class="container">
            <h2 class="title is-4 titulo-elementos">Chefs populares</h2>
            <div class="columns is-multiline">
                <div class="column is-3-desktop has-text-centered">
                    <figure class="image is-1by1 receta-imagen">
                        <img class="is-rounded" src="img/rata1-2.jpg" alt="Chef">
                    </figure>
                    <p class="title is-5">PEPITO</p>
                    <p class="subtitle is-6">NOMBRE DE PERFIL</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="js/index.js"></script>
</body>

</html>
