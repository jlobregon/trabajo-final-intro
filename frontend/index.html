<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Las Recetas de Gusteau</title>
    <link rel="stylesheet" href="css/bulma.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item boton-pagina-navbar" href="index.html">
                <img src="img/gusteau-logo-tipografia.png" alt="Gusteau Logo" class="logo-navbar">
            </a>
            <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navMenu">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </a>
        </div>

        <div id="navMenu" class="navbar-menu">
            <div class="navbar-start">
                <a class="navbar-item boton-pagina-navbar" href="recetas.html">Recetas</a>
                <a class="navbar-item boton-pagina-navbar" href="chefs.html">Chefs</a>
                <a class="navbar-item boton-pagina-navbar" href="ingredientes.html">Nuestra bodega</a>
            </div>

            <div class="navbar-end">
                <div class="navbar-item">
                    <div class="buttons">
                        <a class="button is-primary" href="crear-receta.html"><strong>+ Crear receta</strong></a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <section class="hero is-medium header-section">
        <div id="hero-principal" class="hero-body is-flex is-align-items-center">
            <div id="contenido-hero" class="container has-text-centered">
                <div class="columns is-vcentered ">
                    <div class="column is-half">
                        <img src="img/gusteau-logo-principal.png" class="header-image" alt="Gusteau">
                        <h1 id="titulo-principal" class="title is-1">Cualquiera puede cocinar</h1>
                        <div class="field has-addons">
                            <div class="control is-expanded has-icons-left">
                                <input class="input buscador-elemento" type="text" placeholder="Buscar recetas...">
                                <span class="icon is-left">
                                    <img src="img/icono-busqueda.png" alt="Buscar" class="icono-busqueda buscador-elemento">
                                </span>
                            </div>
                            <div class="control">
                                <button class="button buscador-elemento boton-filtro">
                                    <img src="img/boton-filtro.png" alt="Filtros" class="icono-filtro">
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section class="section" id="recetas-destacadas">
        <div class="container">
            <h2 class="title is-4 titulo-elementos">Recetas populares</h2>
            <div id="contenedor-recetas" class="columns is-multiline">
            </div>
            <hr class="my-5" id="division-recetas-chefs">
        </div>
    </section>
    <section class="section">
        <div class="container">
            <h2 class="title is-4 titulo-elementos">Chefs populares</h2>
            <div id="contenedor-chefs" class="columns is-multiline">
            </div>
        </div>
    </section>

    <div id="modal-receta" class="modal">
        <div class="modal-background"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title" id="modal-titulo">Título receta</p>
                    <button class="delete" aria-label="close"></button>
            </header>
            <section class="modal-card-body" id="modal-cuerpo"></section>
            <footer class="modal-card-foot">
                <button class="button is-danger">Editar</button>
                <button id="boton-borrar-receta" class="button is-danger">Borrar</button>
            </footer>
        </div>
    </div>
    <footer class="footer">
        <div class="content has-text-centered">
            <p><strong>Las Recetas de Gusteau</strong> por APIcultores, usando Bulma.</p>
        </div>
    </footer>
    <script type="module" src="js/index.js"></script>
</body>

</html>
